<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 400">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#16213e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0f3460;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accentGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#e94560;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ff6b6b;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="1200" height="400" fill="url(#bgGradient)"/>
  
  <!-- World Map Grid Lines (stylized) -->
  <g stroke="#2d3a5c" stroke-width="1" opacity="0.3">
    <line x1="200" y1="50" x2="200" y2="350"/>
    <line x1="400" y1="50" x2="400" y2="350"/>
    <line x1="600" y1="50" x2="600" y2="350"/>
    <line x1="800" y1="50" x2="800" y2="350"/>
    <line x1="1000" y1="50" x2="1000" y2="350"/>
    <line x1="100" y1="100" x2="1100" y2="100"/>
    <line x1="100" y1="200" x2="1100" y2="200"/>
    <line x1="100" y1="300" x2="1100" y2="300"/>
  </g>
  
  <!-- Connection Nodes -->
  <g fill="#e94560" opacity="0.6">
    <circle cx="300" cy="150" r="8"/>
    <circle cx="500" cy="200" r="10"/>
    <circle cx="700" cy="180" r="6"/>
    <circle cx="900" cy="250" r="9"/>
    <circle cx="600" cy="280" r="7"/>
  </g>
  
  <!-- Connection Lines -->
  <g stroke="#e94560" stroke-width="2" opacity="0.4" fill="none">
    <path d="M 300 150 Q 400 175 500 200"/>
    <path d="M 500 200 Q 600 190 700 180"/>
    <path d="M 700 180 Q 800 215 900 250"/>
    <path d="M 500 200 Q 550 240 600 280"/>
  </g>
  
  <!-- Main Title -->
  <text x="600" y="160" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="56" font-weight="bold" fill="#ffffff" text-anchor="middle">
    Geo Market Watch
  </text>
  
  <!-- Subtitle -->
  <text x="600" y="210" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="24" fill="#a0aec0" text-anchor="middle">
    LLM-Native Geopolitical Intelligence Framework
  </text>
  
  <!-- Accent Line -->
  <rect x="450" y="240" width="300" height="3" fill="url(#accentGradient)" rx="1.5"/>
  
  <!-- Feature Tags -->
  <g font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="14" fill="#e2e8f0">
    <text x="350" y="290" text-anchor="middle">🌍 Event-Driven</text>
    <text x="500" y="290" text-anchor="middle">📊 Structured Output</text>
    <text x="650" y="290" text-anchor="middle">🎯 Trigger-Based</text>
    <text x="800" y="290" text-anchor="middle">🔄 Propagation Mapping</text>
  </g>
  
  <!-- Bottom decorative elements -->
  <g opacity="0.1">
    <circle cx="100" cy="350" r="60" fill="#e94560"/>
    <circle cx="1100" cy="50" r="80" fill="#e94560"/>
  </g>
</svg>